        async function loadAllNews(forceRefresh = false) {
            const grid = document.getElementById('news-grid');
            const loadingEl = document.getElementById('loading-indicator');
            if (!grid) return;
            
            // Promise-Lock: verhindere Doppelladen
            if (isLoadingPromise) {
                console.log('[loadAllNews] Bereits in Progress, überspringe');
                return;
            }
            
            isLoadingPromise = (async () => {
            
            try {
                // Sortiere Feeds nach Latenz (schnellste zuerst)
                const enabled = sortFeedsByLatency(feeds.filter(f => f.enabled));
                if (!enabled.length) { 
                    grid.innerHTML = '<div class="empty">Keine Feeds aktiviert</div>'; 
                    if (loadingEl) loadingEl.style.display = 'none';
                    return; 
                }
                
                if (loadingEl) {
                    loadingEl.style.display = 'flex';
                    updateLoadingUI('Starte Feed-Laden...', 0);
                }
            
                // === CACHE-FIRST LOGIK ===
                if (hasInitialLoad && !forceRefresh && currentNews.length > 0 && !isBackgroundRefreshing) {
                    console.log('[Cache-First] Background-Refresh ohne Grid-Clear');
                    await performBackgroundRefresh(enabled, loadingEl);
                    hasInitialLoad = true;
                    return;
                }
                
                // === NORMALES LADEN ===
                grid.innerHTML = '';
                proxyManager.reset();
                
                if (forceRefresh) {
                    newsCache = {};
                }
                
                const results = [];
                const delay = ms => new Promise(res => setTimeout(res, ms));
                
                async function fetchWithConcurrency(feeds, limit, itemsPerFeed, onProgress, skipDateFilter = false, forceRefresh = false) {
                    const queue = [...feeds];
                    const running = new Set();
                    const results = [];
                    
                    async function processFeed(feed) {
                        const startTime = Date.now();
                        try {
                            // Phase 2 (skipDateFilter=true) soll immer frische Daten laden, nicht den Cache von Phase 1
                            const skipCache = skipDateFilter || forceRefresh;
                            const items = await fetchFeed(feed, skipDateFilter, itemsPerFeed, skipCache);
                            recordFeedLatency(feed.url, Date.now() - startTime);
                            results.push({ feed: feed, items: items, success: items.length > 0 });
                            if (onProgress) onProgress(feed, items.length);
                            return items.length;
                        } catch (e) {
                            recordFeedLatency(feed.url, Date.now() - startTime);
                            results.push({ feed: feed, items: [], success: false, error: e.message });
                            if (onProgress) onProgress(feed, 0, e.message);
                            return 0;
                        }
                    }
                    
                    while (queue.length > 0 || running.size > 0) {
                        while (running.size < limit && queue.length > 0) {
                            const feed = queue.shift();
                            const promise = processFeed(feed).then(() => running.delete(promise));
                            running.add(promise);
                        }
                        if (running.size > 0) {
                            await Promise.race(Array.from(running));
                        }
                        await delay(50);
                    }
                    return results;
                }
                
                const PHASE1_TIMEOUT = CONFIG.PHASE1_TIMEOUT;
                const PHASE1_ITEMS = CONFIG.PHASE1_ITEMS;
                const PHASE2_ITEMS = CONFIG.PHASE2_ITEMS || -1;
                const CONCURRENT_LIMIT = CONFIG.CONCURRENT_LIMIT;
                
                if (loadingEl) {
                    updateLoadingUI('Phase 1: Schnellvorschau...', 10);
                }
                
                let phase1Results = [];
                const phase1Start = Date.now();
                
                phase1Results = await fetchWithConcurrency(
                    enabled, 
                    CONCURRENT_LIMIT, 
                    PHASE1_ITEMS,
                    (feed, count, error) => {
                        if (loadingEl) {
                            updateLoadingUI(`Phase 1: Lade Feed ${count + 1}/${enabled.length}`, 10 + Math.round((count / enabled.length) * 30));
                        }
                    },
                    false // skipDateFilter = false für Phase 1
                );
                
                const successfulPhase1 = phase1Results.filter(r => r.success && r.items.length > 0);
                const phase1ItemCount = successfulPhase1.reduce((sum, r) => sum + r.items.length, 0);
                console.log('[Phase1] ' + successfulPhase1.length + ' Feeds geladen, ' + phase1ItemCount + ' Items in ' + (Date.now() - phase1Start) + 'ms');
                
                let previewNews = successfulPhase1.map(r => r.items).flat();
                previewNews.forEach(n => n.read = readStatus[n.link] || false);
                previewNews.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                // Global cap für Phase 1
                if (previewNews.length > CONFIG.PHASE1_MAX_ITEMS) {
                    previewNews = previewNews.slice(0, CONFIG.PHASE1_MAX_ITEMS);
                }
                
                currentNews = previewNews;
                renderNews(currentNews);
                console.log('[Phase1] Anzeige: ' + currentNews.length + ' Einträge (max ' + CONFIG.PHASE1_MAX_ITEMS + ')');
                
                if (loadingEl) {
                    updateLoadingUI('Phase 2: Vollständiges Laden...', 45);
                }
                
                let phase2Results = [];
                const phase2Start = Date.now();
                
                phase2Results = await fetchWithConcurrency(
                    enabled, 
                    CONCURRENT_LIMIT, 
                    PHASE2_ITEMS,
                    () => {
                        if (loadingEl) {
                            updateLoadingUI('Phase 2: Feeds werden geladen...', 45 + Math.round(Math.random() * 30));
                        }
                    },
                    true,  // skipDateFilter = TRUE für Phase 2 - ALLE Items (auch älter als 30 Tage)
                    forceRefresh  // forceRefresh = true um Cache zu überspringen
                );
                
                console.log('[Phase2] Abgeschlossen in ' + (Date.now() - phase2Start) + 'ms');
                
                // Kombination: Phase 1 + Phase 2 Items (mit globaler Obergrenze)
                const phase1Success = phase1Results.filter(r => r.success && r.items?.length > 0);
                const phase2Success = phase2Results.filter(r => r.success && r.items?.length > 0);
                const phase2ItemCount = phase2Success.reduce((sum, r) => sum + r.items.length, 0);
                console.log('[Phase2] ' + phase2Success.length + ' Feeds geladen, ' + phase2ItemCount + ' Items');
                
                // Items kombinieren (Duplikate vermeiden)
                const allItems = [];
                const seenLinks = new Set();
                
                // Zuerst alle Phase 2 Items hinzufügen (volle Liste)
                phase2Success.forEach(r => {
                    r.items.forEach(item => {
                        if (item.link && !seenLinks.has(item.link)) {
                            seenLinks.add(item.link);
                            allItems.push(item);
                        }
                    });
                });
                
                // Dann Phase 1 Items hinzufügen die noch nicht vorhanden sind
                phase1Success.forEach(r => {
                    r.items.forEach(item => {
                        if (item.link && !seenLinks.has(item.link)) {
                            seenLinks.add(item.link);
                            allItems.push(item);
                        }
                    });
                });
                
                // Globale Obergrenze anwenden
                const PHASE2_MAX_ITEMS = CONFIG.PHASE2_MAX_ITEMS || 1000;
                if (allItems.length > PHASE2_MAX_ITEMS) {
                    console.log('[Kombiniert] ' + allItems.length + ' Items -> kürze auf ' + PHASE2_MAX_ITEMS);
                    allItems.length = PHASE2_MAX_ITEMS;
                } else {
                    console.log('[Kombiniert] Phase1: ' + phase1ItemCount + ' + Phase2: ' + phase2ItemCount + ' = ' + allItems.length);
                }
                
                currentNews = allItems;
                currentNews.forEach(n => n.read = readStatus[n.link] || false);
                currentNews.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                activeFeedFilter = null;
                renderNews(currentNews);
                renderFeeds();
                renderGroupTabs();
                
                hasInitialLoad = true;
                
                if (loadingEl) {
                    updateLoadingUI('Fertig!', 100);
                    setTimeout(() => { if (loadingEl) loadingEl.style.display = 'none'; }, 500);
                }
                const proxyStats = proxyManager.proxies.map(p => p.type + ':' + p.success + '/' + (p.fails + p.success)).join(', ');
                console.log('[Fertig] ' + currentNews.length + ' Einträge geladen | Proxies: ' + proxyStats);
                resetCountdown();
                
                // Phase 3: Vollständiges Laden aller Items im Hintergrund
                console.log('[Phase3] Starte Hintergrund-Laden aller Items...');
                try {
                    performFullBackgroundLoad();
                } catch(e) {
                    console.error('[Phase3] Startfehler:', e);
                }
            } catch (e) {
                console.error('loadAllNews error:', e);
                const loadingEl = document.getElementById('loading-indicator');
                if (loadingEl) loadingEl.style.display = 'none';
            } finally {
                isLoadingPromise = null;
            }
            })();
            
            try {
                await isLoadingPromise;
            } catch (e) {
                console.error('loadAllNews error:', e);
            }
        }
        
        async function performBackgroundRefresh(enabled, loadingEl) {
            const delay = ms => new Promise(res => setTimeout(res, ms));
            const CONCURRENT_LIMIT = 2; // Erhöht für schnellere Aktualisierung
            
            isBackgroundRefreshing = true;
            
            async function fetchWithConcurrency(feeds, limit, itemsPerFeed, onProgress) {
                const queue = [...feeds];
                const running = new Set();
                const results = [];
                
                async function processFeed(feed) {
                    try {
                        const items = await fetchFeed(feed, true, -1, true); // skipDateFilter = true für ALLE Items
                        results.push({ feed: feed, items: items, success: items.length > 0 });
                        if (onProgress) onProgress(feed, items.length);
                        return items.length;
                    } catch (e) {
                        results.push({ feed: feed, items: [], success: false, error: e.message });
                        if (onProgress) onProgress(feed, 0, e.message);
                        return 0;
                    }
                }
                
                while (queue.length > 0 || running.size > 0) {
                    while (running.size < limit && queue.length > 0) {
                        const feed = queue.shift();
                        const promise = processFeed(feed).then(() => running.delete(promise));
                        running.add(promise);
                    }
                    if (running.size > 0) {
                        await Promise.race(Array.from(running));
                    }
                    await delay(50);
                }
                return results;
            }
            
            try {
                if (loadingEl) updateLoadingUI('Aktualisiere Feeds...', 50);
                const backgroundResults = await fetchWithConcurrency(enabled, CONCURRENT_LIMIT, -1, () => {});
                
                const newItems = backgroundResults
                    .filter(r => r.success && r.items.length > 0)
                    .map(r => r.items)
                    .flat();
                
                if (newItems.length > 0) {
                    const existingLinks = new Set(currentNews.map(n => n.link));
                    const trulyNewItems = newItems.filter(n => !existingLinks.has(n.link));
                    
                    if (trulyNewItems.length > 0) {
                        console.log('[Background] ' + trulyNewItems.length + ' neue Einträge gefunden');
                        currentNews = [...trulyNewItems, ...currentNews];
                        currentNews.sort((a, b) => new Date(b.date) - new Date(a.date));
                        renderNews(currentNews);
                        
                        // Auto-Scroll nach oben bei neuen Nachrichten
                        scrollToTop(true);
                    }
                }
                
                console.log('[Background] Refresh abgeschlossen');
            } catch (e) {
                console.log('[Background] Refresh fehlgeschlagen:', e.message);
            } finally {
                isBackgroundRefreshing = false;
                if (loadingEl) {
                    updateLoadingUI('Aktualisiert!', 100);
                    setTimeout(() => { if (loadingEl) loadingEl.style.display = 'none'; }, 500);
                }
            }
        }
        
        // Phase 3: Vollständiges Laden aller Items im Hintergrund (keine 30-Tage-Begrenzung)
        let isPhase3Running = false;
        
        async function performFullBackgroundLoad() {
            if (isPhase3Running) {
                console.log('[Phase3] Bereits aktiv, überspringe');
                return;
            }
            
            // Hole aktive Feeds
            const enabled = sortFeedsByLatency(feeds.filter(f => f.enabled));
            if (!enabled.length) {
                console.log('[Phase3] Keine aktiven Feeds');
                return;
            }
            
            isPhase3Running = true;
            
            const delay = ms => new Promise(res => setTimeout(res, ms));
            const PHASE3_CONCURRENT = 1; // Langsam, damit Phase 1+2 nicht gestört werden
            
            console.log('[Phase3] Starte vollständiges Laden aller Items...');
            
            async function fetchWithConcurrencyPhase3(feeds, limit, onProgress) {
                const queue = [...feeds];
                const running = new Set();
                const results = [];
                let completed = 0;
                
                async function processFeed(feed) {
                    try {
                        // Phase 3: Lädt ALLE Items, ignoriert 30-Tage-Regel komplett
                        const items = await fetchFeed(feed, true, -1, true); // skipDateFilter = true
                        results.push({ feed: feed, items: items, success: items.length > 0 });
                        completed++;
                        if (onProgress) onProgress(completed, feeds.length, feed.name);
                        return items.length;
                    } catch (e) {
                        results.push({ feed: feed, items: [], success: false, error: e.message });
                        completed++;
                        if (onProgress) onProgress(completed, feeds.length, feed.name);
                        return 0;
                    }
                }
                
                while (queue.length > 0 || running.size > 0) {
                    while (running.size < limit && queue.length > 0) {
                        const feed = queue.shift();
                        const promise = processFeed(feed).then(() => running.delete(promise));
                        running.add(promise);
                    }
                    if (running.size > 0) {
                        await Promise.race(Array.from(running));
                    }
                    await delay(100); // Längere Pause zwischen Requests
                }
                return results;
            }
            
            try {
                const loadingEl = document.getElementById('loading-indicator');
                if (loadingEl) {
                    loadingEl.style.display = 'flex';
                }
                
                const phase3Results = await fetchWithConcurrencyPhase3(
                    enabled,
                    PHASE3_CONCURRENT,
                    (completed, total, feedName) => {
                        console.log('[Phase3] Lade ' + completed + '/' + total + ': ' + feedName);
                        if (loadingEl) {
                            updateLoadingUI('Phase 3: Vollständiges Laden... ' + completed + '/' + total, 50 + Math.round((completed / total) * 50));
                        }
                    }
                );
                
                // Sammle alle neuen Items
                const allNewItems = phase3Results
                    .filter(r => r.success && r.items?.length > 0)
                    .map(r => r.items)
                    .flat();
                
                if (allNewItems.length > 0) {
                    const existingLinks = new Set(currentNews.map(n => n.link));
                    const trulyNewItems = allNewItems.filter(n => !existingLinks.has(n.link));
                    
                    if (trulyNewItems.length > 0) {
                        console.log('[Phase3] ' + trulyNewItems.length + ' neue Einträge gefunden (insgesamt ' + allNewItems.length + ')');
                        
                        // Füge neue Items hinzu und sortiere nach Datum
                        currentNews = [...currentNews, ...trulyNewItems];
                        
                        // Globale Obergrenze für Gesamt-Items (Phase 1+2+3)
                        const MAX_TOTAL_ITEMS = 1500;
                        if (currentNews.length > MAX_TOTAL_ITEMS) {
                            currentNews.sort((a, b) => new Date(b.date) - new Date(a.date));
                            currentNews.length = MAX_TOTAL_ITEMS;
                            console.log('[Phase3] Gesamt-Items begrenzt auf ' + MAX_TOTAL_ITEMS);
                        } else {
                            currentNews.sort((a, b) => new Date(b.date) - new Date(a.date));
                        }
                        
                        // Aktualisiere Anzeige (aber nicht scrollen, Nutzer liest bereits)
                        renderNews(currentNews);
                        renderGroupTabs();
                    } else {
                        console.log('[Phase3] Keine komplett neuen Einträge (alle bereits vorhanden)');
                    }
                }
                
                const totalItemsLoaded = phase3Results.reduce((sum, r) => sum + (r.items?.length || 0), 0);
                console.log('[Phase3] Abgeschlossen: ' + totalItemsLoaded + ' Items geladen');
                
            } catch (e) {
                console.log('[Phase3] Fehlgeschlagen:', e.message);
            } finally {
                isPhase3Running = false;
                const loadingEl = document.getElementById('loading-indicator');
                if (loadingEl) {
                    updateLoadingUI('Vollständig geladen!', 100);
                    setTimeout(() => { if (loadingEl) loadingEl.style.display = 'none'; }, 1000);
                }
            }
        }
        
        async function fetchFeed(feed, skipDateFilter = false, limit = -1, skipCache = false) {
            const cacheKey = feed.url;
            const cached = newsCache[cacheKey];
            const isCached = cached && !skipCache && Date.now() - cached.time < CONFIG.CACHE_TTL;
            if (isCached) {
                debugLog('[fetchFeed] ' + feed.name + ': Cache verwendet (' + cached.items.length + ' items), limit=' + limit);
                return limit > 0 ? cached.items.slice(0, limit) : cached.items;
            }
            
            debugLog('[fetchFeed] ' + feed.name + ': Frische Daten laden (skipCache=' + skipCache + ', skipDateFilter=' + skipDateFilter + ')');
            
            try {
                const res = await Promise.race([
                    fetchDirectFirst(feed.url),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), CONFIG.FEED_TIMEOUT))
                ]);
                
                if (!res || !res.ok) {
                    throw new Error(res?.status ? 'HTTP ' + res.status : 'Keine Antwort');
                }
                
                const text = await res.text();
                
                if (!text || text.length < 10) {
                    throw new Error('Leere Antwort');
                }
                
                // Versuche Worker, fallback auf Main-Thread
                let allItems;
                if (parserWorkerAvailable) {
                    try {
                        allItems = await parseFeedInWorker(feed, text);
                        console.log('[Worker] ' + feed.name + ': ' + allItems.length + ' Items (Worker)');
                    } catch (workerErr) {
                        console.log('[Worker] ' + feed.name + ' fallback: ' + workerErr.message);
                        allItems = parseFeedMainThread(text, skipDateFilter, feed);
                    }
                } else {
                    allItems = parseFeedMainThread(text, skipDateFilter, feed);
                }
                
                // Limit anwenden (wenn angegeben, sonst alle)
                const items = limit > 0 ? allItems.slice(0, limit) : allItems;
                
                debugLog('[fetchFeed] ' + feed.name + ': ' + allItems.length + ' alle, ' + items.length + ' zurückgegeben (limit=' + limit + ', skipDateFilter=' + skipDateFilter + ')');
                
                if (!items.length && !skipDateFilter) throw new Error('Keine Einträge gefunden');
                
                newsCache[cacheKey] = { items, time: Date.now() };
                pruneCache();
                try { localStorage.setItem('rss_cache', JSON.stringify(newsCache)); } catch(e) { console.warn('Cache speichern fehlgeschlagen:', e.message); }
                return items;
            } catch (e) {
                const errorMsg = e.message || String(e);
                console.error('[fetchFeed] ' + feed.name + ': ' + errorMsg);
                throw e;
            }
        }
        
        // Main-Thread Fallback für XML-Parsing
        function parseFeedMainThread(text, skipDateFilter, feed) {
            // Prüfen ob es gültiges XML ist
            if (!text || text.length < 20) {
                throw new Error('Leere oder zu kurze Antwort');
            }
            
            // HTML-Antworten erkennen (kein XML)
            if (text.includes('<!DOCTYPE html') || text.includes('<html') || text.includes('<!DOCTYPE>')) {
                throw new Error('Server antwortet mit HTML statt RSS: ' + text.slice(0, 100));
            }
            
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, 'text/xml');
            
            const parseError = xml.querySelector('parsererror');
            if (parseError) {
                // Versuchen, RSS aus HTML zu extrahieren
                const rssMatch = text.match(/<rss[^>]*>[\s\S]*?<\/rss>/i);
                if (rssMatch) {
                    const xml2 = parser.parseFromString(rssMatch[0], 'text/xml');
                    const err2 = xml2.querySelector('parsererror');
                    if (!err2) {
                        return parseRssFromXml(xml2, skipDateFilter, feed);
                    }
                }
                throw new Error('XML Parse-Fehler: ' + parseError.textContent?.slice(0, 100));
            }
            
            return parseRssFromXml(xml, skipDateFilter, feed);
        }
        
        function parseRssFromXml(xml, skipDateFilter, feed) {
            const thirtyDaysAgo = Date.now() - (CONFIG.DAYS_BACK * 24 * 60 * 60 * 1000);
            const parsedItems = Array.from(xml.querySelectorAll('item, entry')).map(item => {
                const enclosure = item.querySelector('enclosure[type^="image"]');
                const thumbnail = item.querySelector('thumbnail, media\\:thumbnail');
                const mediaContent = item.querySelector('media\\:content, media\\:content');
                const mediaGroup = item.querySelector('media\\:group, media\\:group');
                
                let img = enclosure?.getAttribute('url') || thumbnail?.getAttribute('url') || mediaContent?.getAttribute('url') || '';
                
                if (!img && mediaGroup) {
                    const mediaThumb = mediaGroup.querySelector('media\\:thumbnail, thumbnail');
                    img = mediaThumb?.getAttribute('url') || '';
                }
                
                if (!img) {
                    const ogImage = item.querySelector('meta[property="og:image"]');
                    if (ogImage) img = ogImage.getAttribute('content');
                }
                
                if (!img) {
                    const twitterImage = item.querySelector('meta[name="twitter:image"]');
                    if (twitterImage) img = twitterImage.getAttribute('content');
                }
                
                if (!img) {
                    const content = item.querySelector('content\\:encoded, content')?.textContent || '';
                    const desc = item.querySelector('description, summary')?.textContent || '';
                    const allContent = content + desc;
                    
                    const imgMatches = allContent.match(/<img[^>]+src=["']([^"']+)["']/g);
                    if (imgMatches && imgMatches.length > 0) {
                        for (const match of imgMatches) {
                            const srcMatch = match.match(/src=["']([^"']+)["']/);
                            if (srcMatch && srcMatch[1] && !srcMatch[1].startsWith('data:') && !srcMatch[1].includes('pixel') && !srcMatch[1].includes('1x1')) {
                                img = srcMatch[1];
                                break;
                            }
                        }
                    }
                }
                
                if (!img) {
                    const content = item.querySelector('content\\:encoded, content')?.textContent || '';
                    const lazyMatch = content.match(/data-src=["']([^"']+)["']/);
                    if (lazyMatch) img = lazyMatch[1];
                }
                
                if (!img) {
                    const content = item.querySelector('content\\:encoded, content, description')?.textContent || '';
                    const srcsetMatch = content.match(/srcset=["']([^"']+)["']/);
                    if (srcsetMatch && srcsetMatch[1]) {
                        const firstSrc = srcsetMatch[1].split(',')[0].trim().split(' ')[0];
                        if (firstSrc && !firstSrc.startsWith('data:')) img = firstSrc;
                    }
                }
                
                return {
                    title: item.querySelector('title')?.textContent || '',
                    link: item.querySelector('link')?.textContent || item.querySelector('link')?.getAttribute('href') || '',
                    date: item.querySelector('pubDate, published, updated')?.textContent || '',
                    desc: item.querySelector('description, summary, content')?.textContent || '',
                    img: img,
                    feed: feed.name,
                    feedId: feed.id,
                    feedUrl: feed.url
                };
            }).filter(i => {
                if (!i.title) return false;
                if (skipDateFilter) return true;
                const itemDate = new Date(i.date).getTime();
                return !isNaN(itemDate) && itemDate > thirtyDaysAgo;
            });
            
            const withImages = parsedItems.filter(i => i.img).length;
            if (withImages > 0) debugLog('[parseFeed] ' + feed.name + ': ' + parsedItems.length + ' items, ' + withImages + ' mit Bild');
            return parsedItems;
        }
        
        function renderNews(news) {
            const grid = document.getElementById('news-grid');
            if (!news.length) { grid.innerHTML = '<div class="empty">Keine Nachrichten</div>'; return; }
            
            // Reset display count on new render
            displayedNewsCount = 0;
            allNewsLoaded = false;
            
            if (sortOrder === 'date') {
                news.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (sortOrder === 'feed') {
                news.sort((a, b) => (a.feed || '').localeCompare(b.feed || ''));
            }
            
            // Infinite Scroll: ALLE Items sofort anzeigen (kein Klicken nötig)
            const newsToDisplay = news;
            displayedNewsCount = news.length;
            allNewsLoaded = true;
            
            grid.innerHTML = newsToDisplay.map(n => {
                const isRead = readStatus[n.link];
                const linkEsc = escape(n.link);
                let faviconUrl = '';
                try { faviconUrl = n.feedUrl ? new URL(n.feedUrl).hostname : ''; } catch(e) {}
                const favicon = faviconUrl ? `<img src="https://www.google.com/s2/favicons?domain=${faviconUrl}&sz=32" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-left:4px;" onerror="this.style.display='none'">` : '';
                const hasImg = n.img && n.img.length > 0;
                const feedNameEsc = escape(n.feed || 'Feed');
                const dateLabel = formatDate(n.date);
                return `
                <article class="news-card ${isRead ? 'read' : 'unread'}" data-link="${linkEsc}" onclick="markAsRead(this.dataset.link)">
                    ${showImages ? `<div class="news-card-img" style="position:relative;height:160px;overflow:hidden;background:var(--border);display:flex;align-items:center;justify-content:center;">
                        ${hasImg ? `<img src="${n.img}" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">` : ''}
                        ${!hasImg ? `<span style="color:var(--muted);font-size:2rem;">📰</span>` : ''}
                        ${!isRead ? `<span class="new-badge">NEU</span>` : ''}
                    </div>` : ''}
                    <div class="news-card-content">
                        <h3><a href="${n.link}" target="_blank" onclick="event.stopPropagation(); markAsRead(this.dataset.link)">${escape(n.title)}</a></h3>
                        <div class="meta">
                            <span class="feed-preview" data-feed-url="${escape(n.feedUrl || '')}" data-feed-name="${feedNameEsc}" title="${escape(n.feedUrl || '')}">${n.feed}${favicon}</span>
                            ${dateLabel ? `<span style="margin-left:8px;color:var(--muted);font-size:0.8rem;">${escape(dateLabel)}</span>` : ''}
                        </div>
                        <p>${escape(n.desc?.replace(/<[^>]+>/g, '').slice(0, CONFIG.DESC_LENGTH))}</p>
                    </div>
                </article>
            `}).join('');
            
            // Infinite Scroll deaktiviert - alle Items werden sofort angezeigt
            // Kein "Mehr laden" Button mehr nötig
        }
        
        function setupInfiniteScroll(allNews) {
            const grid = document.getElementById('news-grid');
            if (!grid) return;
            
            // Vorherigen Handler entfernen
            const oldHandler = grid.onscroll;
            grid.onscroll = null;
            
            grid.onscroll = function() {
                if (infiniteScrollLoading || allNewsLoaded) return;
                
                const scrollHeight = grid.scrollHeight;
                const scrollTop = grid.scrollTop;
                const clientHeight = grid.clientHeight;
                
                // Wenn wir nah am Ende sind (100px vor Ende)
                if (scrollHeight - scrollTop - clientHeight < 100) {
                    loadMoreNews(allNews);
                }
            };
        }
        
        function loadMoreNews(allNews) {
            if (infiniteScrollLoading || allNewsLoaded) return;
            
            infiniteScrollLoading = true;
            const grid = document.getElementById('news-grid');
            
            // Nächste 50 Items laden
            const increment = 50;
            const nextBatch = allNews.slice(displayedNewsCount, displayedNewsCount + increment);
            
            if (nextBatch.length === 0) {
                allNewsLoaded = true;
                infiniteScrollLoading = false;
                updateInfiniteScrollStatus(allNews.length);
                return;
            }
            
            // Neue Items rendern
            const newHtml = nextBatch.map(n => {
                const isRead = readStatus[n.link];
                const linkEsc = escape(n.link);
                let faviconUrl = '';
                try { faviconUrl = n.feedUrl ? new URL(n.feedUrl).hostname : ''; } catch(e) {}
                const favicon = faviconUrl ? `<img src="https://www.google.com/s2/favicons?domain=${faviconUrl}&sz=32" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-left:4px;" onerror="this.style.display='none'">` : '';
                const hasImg = n.img && n.img.length > 0;
                const feedNameEsc = escape(n.feed || 'Feed');
                const dateLabel = formatDate(n.date);
                return `
                <article class="news-card ${isRead ? 'read' : 'unread'}" data-link="${linkEsc}" onclick="markAsRead(this.dataset.link)">
                    ${showImages ? `<div class="news-card-img" style="position:relative;height:160px;overflow:hidden;background:var(--border);display:flex;align-items:center;justify-content:center;">
                        ${hasImg ? `<img src="${n.img}" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">` : ''}
                        ${!hasImg ? `<span style="color:var(--muted);font-size:2rem;">📰</span>` : ''}
                        ${!isRead ? `<span class="new-badge">NEU</span>` : ''}
                    </div>` : ''}
                    <div class="news-card-content">
                        <h3><a href="${n.link}" target="_blank" onclick="event.stopPropagation(); markAsRead(this.dataset.link)">${escape(n.title)}</a></h3>
                        <div class="meta">
                            <span class="feed-preview" data-feed-url="${escape(n.feedUrl || '')}" data-feed-name="${feedNameEsc}" title="${escape(n.feedUrl || '')}">${n.feed}${favicon}</span>
                            ${dateLabel ? `<span style="margin-left:8px;color:var(--muted);font-size:0.8rem;">${escape(dateLabel)}</span>` : ''}
                        </div>
                        <p>${escape(n.desc?.replace(/<[^>]+>/g, '').slice(0, CONFIG.DESC_LENGTH))}</p>
                    </div>
                </article>`;
            }).join('');
            
            grid.insertAdjacentHTML('beforeend', newHtml);
            displayedNewsCount += nextBatch.length;
            
            if (displayedNewsCount >= allNews.length) {
                allNewsLoaded = true;
            }
            
            infiniteScrollLoading = false;
            updateInfiniteScrollStatus(allNews.length);
        }
        
        function updateInfiniteScrollStatus(total) {
            const statusEl = document.getElementById('infinite-scroll-status');
            if (statusEl) {
                if (allNewsLoaded) {
                    statusEl.textContent = `Alle ${total} Einträge geladen`;
                    statusEl.style.cursor = 'default';
                } else {
                    statusEl.textContent = `Mehr laden (${displayedNewsCount} von ${total}) - Scrollen oder klicken`;
                    statusEl.style.cursor = 'pointer';
                }
            }
        }
        
        function renderCurrentNews() {
            const showUnreadOnly = document.getElementById('show-unread')?.checked;
            const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';
            let newsToShow = currentNews;
            
            if (activeGroupFilter !== null) {
                const groupFeedIds = feeds.filter(f => f.groupId === activeGroupFilter && f.enabled).map(f => f.id);
                newsToShow = newsToShow.filter(n => groupFeedIds.includes(n.feedId));
            }
            
            if (searchTerm) {
                newsToShow = newsToShow.filter(n => 
                    n.title?.toLowerCase().includes(searchTerm) || 
                    n.desc?.toLowerCase().includes(searchTerm) ||
                    n.feed?.toLowerCase().includes(searchTerm)
                );
            }
            
            if (showUnreadOnly) {
                newsToShow = newsToShow.filter(n => !readStatus[n.link]);
            }
            
            if (activeFeedFilter) {
                const feed = feeds.find(f => f.id === activeFeedFilter);
                if (feed && feed.enabled) {
                    const filtered = newsCache[feed.url]?.items || [];
                    let feedNews = filtered.map(n => ({...n, feed: feed.name, feedUrl: feed.url}));
                    if (searchTerm) {
                        feedNews = feedNews.filter(n => 
                            n.title?.toLowerCase().includes(searchTerm) || 
                            n.desc?.toLowerCase().includes(searchTerm)
                        );
                    }
                    if (showUnreadOnly) {
                        feedNews = feedNews.filter(n => !readStatus[n.link]);
                    }
                    renderNews(feedNews);
                    return;
                }
            }
            renderNews(newsToShow);
        }
        
        function formatDate(d) {
            if (!d) return '';
            try { return new Date(d).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
            catch { return d; }
        }
        
        function markAsRead(link) {
            if (!link || readStatus[link]) return;
            readStatus[link] = true;
            safeSetItem('rss_read', readStatus);
            renderCurrentNews();
        }
        
        function toggleUnreadFilter() {
            renderCurrentNews();
        }
        
        function markAllRead() {
            if (!confirm('Alle Artikel als gelesen markieren?')) return;
            currentNews.forEach(n => { if (n.link) readStatus[n.link] = true; });
            safeSetItem('rss_read', readStatus);
            renderCurrentNews();
        }
        
        function escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]) || ''); }
        
        // URL-Validierung
        function isValidFeedUrl(url) {
            try {
                const parsed = new URL(url);
                return parsed.protocol === 'http:' || parsed.protocol === 'https:';
            } catch(e) {
                return false;
            }
        }
        
        async function addFeed() {
            const name = document.getElementById('feed-name').value.trim();
            const url = document.getElementById('feed-url').value.trim();
            const groupId = document.getElementById('feed-group').value ? parseInt(document.getElementById('feed-group').value) : null;
            if (!name || !url) return alert('Name und URL erforderlich');
            
            if (!isValidFeedUrl(url)) {
                return alert('Ungültige URL. Bitte eine gültige HTTP/HTTPS-URL eingeben.');
            }
            
            if (!Array.isArray(feeds)) feeds = [];
            
            const btn = document.querySelector('#tab-feeds .add-feed-form button');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Prüfe...';
            btn.disabled = true;
            
            try {
                await fetchFeed({ url, name: 'Test' });
                feeds.push({ id: Date.now(), name, url, enabled: true, groupId: groupId });
                saveFeeds();
                renderFeeds();
                loadAllNews();
                document.getElementById('feed-name').value = '';
                document.getElementById('feed-url').value = '';
            } catch (e) {
                alert('URL nicht erreichbar: ' + e.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
        
        function toggleFeed(id) {
            const f = feeds.find(f => f.id === id);
            if (f) { f.enabled = !f.enabled; saveFeeds(); loadAllNews(); }
        }
        
        async function checkAllFeeds() {
            const btn = document.querySelector('.feed-center button');
            btn.textContent = '⏳ Prüfe...';
            btn.disabled = true;
            
            let failedCount = 0;
            const failedFeeds = [];
            feedStatus = {};
            
            for (const feed of feeds) {
                try {
                    const tempCache = newsCache[feed.url];
                    if (tempCache) {
                        feedStatus[feed.id] = 'ok';
                    } else {
                        await fetchFeed(feed, true);
                        feedStatus[feed.id] = 'ok';
                    }
                } catch (e) {
                    console.log('Feed fehlgeschlagen:', feed.name, e.message);
                    if (feeds.filter(f => f.enabled).length > 1) {
                        failedCount++;
                        feedStatus[feed.id] = 'error';
                        feed.enabled = false;
                        failedFeeds.push(feed.name);
                    }
                }
                renderFeeds();
            }
            
            saveFeeds();
            renderFeeds();
            
            btn.textContent = '🔍 Alle prüfen';
            btn.disabled = false;
            
            if (failedCount > 0) {
                alert(`${failedCount} Feed(s) wurden deaktiviert (nicht erreichbar):\n${failedFeeds.join('\n')}`);
            } else {
                alert('Alle Feeds sind erreichbar!');
            }
        }
        
        function deleteFeed(id) {
            if (!confirm('Feed wirklich löschen?')) return;
            feeds = feeds.filter(f => f.id !== id);
            saveFeeds();
            renderFeeds();
            loadAllNews();
        }
        
        function filterFeed(id) {
            activeFeedFilter = activeFeedFilter === id ? null : id;
            const f = feeds.find(f => f.id === activeFeedFilter);
            
            document.querySelectorAll('.feed-item').forEach(el => el.classList.remove('active'));
            if (activeFeedFilter) {
                event.target.closest('.feed-item')?.classList.add('active');
            }
            
            if (!activeFeedFilter) {
                renderNews(currentNews);
                return;
            }
            
            if (!f.enabled) {
                renderNews([]);
                return;
            }
            
            const filtered = newsCache[f.url]?.items || [];
            renderNews(filtered.map(n => ({...n, feed: f.name})));
        }
        
        function setIntervalFromSettings() {
            const el = document.getElementById('interval-settings');
            if (!el) return;
            const v = el.value;
            console.log('[setInterval] Wert geändert zu:', v);
            localStorage.setItem('rss_interval', v);
            setupAutoRefresh();
        }
        
        function setSort() {
            sortOrder = document.getElementById('sort-settings').value;
            safeSetItem('rss_sort', sortOrder);
            renderCurrentNews();
        }
        
        function setupAutoRefresh() {
            const v = localStorage.getItem('rss_interval') || '0';
            const el = document.getElementById('interval-settings');
            if (el) el.value = v;
            
            // Timer aufräumen
            if (intervalId) { clearInterval(intervalId); intervalId = null; }
            if (countdownId) { clearInterval(countdownId); countdownId = null; }
            
            console.log('[AutoRefresh] Wert:', v, 'IntervalId:', intervalId);
            
            if (v > 0) {
                const intervalMs = parseInt(v);
                console.log('[AutoRefresh] Starte Timer für', intervalMs, 'ms');
                intervalId = setInterval(() => {
                    loadAllNews(false);
                    resetCountdown();
                }, intervalMs);
                nextRefreshTime = Date.now() + intervalMs;
                countdownId = setInterval(updateCountdown, 1000);
                updateGreeting();
                console.log('[AutoRefresh] Timer gestartet, nextRefreshTime:', nextRefreshTime);
            } else {
                nextRefreshTime = 0;
                updateGreeting();
                console.log('[AutoRefresh] Manuell - kein Timer');
            }
        }
        
        function updateCountdown() {
            updateGreeting();
        }
        
        function resetCountdown() {
            const v = localStorage.getItem('rss_interval') || '0';
            if (v > 0) {
                nextRefreshTime = Date.now() + parseInt(v);
            }
        }
        
        function clearCache() {
            if (!confirm('Cache leeren? Alle Nachrichten werden neu geladen.')) return;
            newsCache = {};
            localStorage.removeItem('rss_cache');
            loadAllNews();
        }
        
        function exportFeeds() {
            const data = JSON.stringify(feeds, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'feeds.json';
            a.click();
        }
        
        function importFeeds(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const parsed = safeJsonParse(ev.target.result, {});
                    if (Array.isArray(parsed)) {
                        feeds = parsed;
                    } else if (parsed.feeds && Array.isArray(parsed.feeds)) {
                        // Format: { "feeds": [...] }
                        feeds = parsed.feeds.map((f, i) => ({
                            id: Date.now() + i,
                            name: f.name,
                            url: f.url,
                            enabled: true
                        }));
                    } else {
                        throw new Error('Ungültiges Format');
                    }
                    saveFeeds();
                    renderFeeds();
                    switchTab('feeds');
                    setTimeout(() => checkAllFeeds(), 500);
                } catch (err) { 
                    alert('Ungültige Datei: ' + err.message); 
                }
            };
            reader.readAsText(file);
        }
        
        init();
    </script>
</body>
</html>
