<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1625">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>SammleRSS</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #fff;
            --text: #333;
            --text-secondary: #555;
            --accent: #2563eb;
            --border: #e5e5e5;
            --shadow: rgba(0,0,0,0.1);
            --muted: #666;
            --on-accent: #fff;
            --inverse: #000;
        }
        
        [data-theme="dark"] {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e4e4e7;
            --text-secondary: #cbd5e1;
            --accent: #3b82f6;
            --border: #2d3748;
            --shadow: rgba(0,0,0,0.3);
            --muted: #94a3b8;
            --on-accent: #fff;
            --inverse: #fff;
        }
        
        [data-theme="modern"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #06b6d4;
            --border: #334155;
            --shadow: rgba(0,0,0,0.4);
            --muted: #94a3b8;
            --on-accent: #fff;
            --inverse: #fff;
        }
        
        [data-theme="purple"] {
            --bg: #1a1625;
            --card-bg: #2d2640;
            --text: #e8e4f0;
            --text-secondary: #b8b0cc;
            --accent: #9d5ce0;
            --border: #3d3654;
            --shadow: rgba(157, 92, 224, 0.15);
            --muted: #8b7fa3;
            --on-accent: #fff;
            --inverse: #fff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent), #7c3aed); border-radius: 10px; border: 2px solid var(--card-bg); }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #c084fc, var(--accent)); }
        
        /* Firefox */
        * { scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        
        header { background: rgba(45, 38, 64, 0.85); padding: 0.5rem; border-bottom: 1px solid rgba(157, 92, 224, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); transition: all 0.3s; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .header-content { max-width: 900px; margin: 0 auto; }
        .header-top { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 16px; position: relative; }
        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.2s ease; }
        .brand:hover { transform: scale(1.02); }
        .logo { height: 36px; width: auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(157, 92, 224, 0.3); }
        .logo-text { 
            font-size: 1.4rem; 
            font-weight: 700;
            font-family: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
            letter-spacing: 0.05em;
            background: linear-gradient(90deg, #9d5ce0, #c084fc, #9d5ce0);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s linear infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        h1 { font-size: 1.3rem; }
        
        .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); justify-content: flex-start; }
        .tab { padding: 6px 12px; cursor: pointer; border: none; background: none; font-size: 0.85rem; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
        
        /* Sidebar buttons */
        .sidebar-btn { background: transparent; cursor: pointer; font-size: 0.85rem; transition: background 0.15s ease; box-sizing: border-box; width: 100%; }
        .sidebar-btn:hover { background: rgba(157, 92, 224, 0.3); }
        .sidebar-btn.active { background: rgba(157, 92, 224, 0.5); font-weight: 600; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
        
        .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        button, select, input[type="text"] { padding: 10px 14px; border: 1px solid rgba(157, 92, 224, 0.3); border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, rgba(45, 38, 64, 0.9), rgba(26, 22, 37, 0.9)); color: var(--text); font-size: 0.9rem; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        button:hover { background: linear-gradient(135deg, rgba(157, 92, 224, 0.3), rgba(124, 58, 237, 0.3)); border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(157, 92, 224, 0.25); }
        button:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(157, 92, 224, 0.15); }
        input::placeholder { color: var(--muted); opacity: 0.7; }
        input[type="color"] { width: 40px; height: 36px; padding: 2px; border: 1px solid rgba(157, 92, 224, 0.3); border-radius: 10px; cursor: pointer; background: linear-gradient(135deg, rgba(45, 38, 64, 0.9), rgba(26, 22, 37, 0.9)); }
        
        .main { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Modern Card Style */
        .card { background: linear-gradient(135deg, rgba(45, 38, 64, 0.9), rgba(26, 22, 37, 0.9)); border-radius: 16px; padding: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(157, 92, 224, 0.1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .card:hover { box-shadow: 0 12px 48px rgba(157, 92, 224, 0.2), 0 0 0 1px rgba(157, 92, 224, 0.3); transform: translateY(-4px); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modern Tab Style */
        .tab { padding: 10px 18px; cursor: pointer; border: none; background: transparent; font-size: 0.9rem; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s ease; border-radius: 8px 8px 0 0; }
        .tab:hover { color: var(--text); background: rgba(157, 92, 224, 0.1); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; background: rgba(157, 92, 224, 0.1); }
        
        /* Feed-Verwaltung */
        .feed-manager { display: grid; grid-template-columns: 300px 1fr 220px; gap: 20px; }
        @media (max-width: 1100px) { .feed-manager { grid-template-columns: 1fr; } }
        
        .feed-center, .feed-actions-panel, .feed-sidebar { background: linear-gradient(135deg, rgba(45, 38, 64, 0.95), rgba(26, 22, 37, 0.95)); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(157, 92, 224, 0.1); transition: all 0.3s ease; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        
        .feed-center h2, .feed-actions-panel h2, .feed-sidebar h2 { font-size: 1.1rem; margin-bottom: 16px; font-weight: 600; }
        .feed-center .feed-list { max-height: 500px; overflow-y: auto; }
        
        .feed-list { list-style: none; max-height: 500px; overflow-y: auto; overflow-x: hidden; }
        .feed-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; box-sizing: background; background: transparent; }
        .feed-item:hover { background: linear-gradient(135deg, rgba(157, 92, 224, 0.2), rgba(124, 58, 237, 0.15)); border-color: rgba(157, 92, 224, 0.4); transform: translateX(4px); }
        .feed-item.active { background: linear-gradient(135deg, rgba(157, 92, 224, 0.3), rgba(124, 58, 237, 0.25)); border-color: var(--accent); transform: translateX(4px); }
        
        .feed-delete { color: #ef4444; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s ease; }
        .feed-delete:hover { background: rgba(239, 68, 68, 0.2); transform: scale(1.1); }
        
        .add-feed-form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .add-feed-form input, .add-feed-form select { padding: 12px 14px; border-radius: 10px; transition: all 0.2s ease; border: 1px solid var(--border); }
        .add-feed-form input:focus, .add-feed-form select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(157, 92, 224, 0.2); }
        .add-feed-form button { background: linear-gradient(135deg, #9d5ce0, #7c3aed); color: var(--on-accent); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(157, 92, 224, 0.3); }
        .add-feed-form button:hover { filter: brightness(1.15); transform: translateY(-3px); box-shadow: 0 8px 25px rgba(157, 92, 224, 0.5); }
        .feed-actions { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
        .feed-actions button { padding: 10px 16px; border-radius: 10px; transition: all 0.2s ease; font-weight: 500; }
        .feed-actions button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
        
        /* Nachrichten-Bereich */
        .layout-options { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .layout-options label { font-size: 0.9rem; color: var(--muted); }
        .layout-btn { padding: 8px 14px; border: 1px solid rgba(157, 92, 224, 0.3); background: linear-gradient(135deg, rgba(45, 38, 64, 0.9), rgba(26, 22, 37, 0.9)); cursor: pointer; color: var(--text); border-radius: 10px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .layout-btn:hover { border-color: var(--accent); background: linear-gradient(135deg, rgba(157, 92, 224, 0.25), rgba(124, 58, 237, 0.2)); transform: translateY(-2px); }
        .layout-btn.active { background: linear-gradient(135deg, #9d5ce0, #7c3aed); color: var(--on-accent); border-color: var(--accent); box-shadow: 0 6px 20px rgba(157, 92, 224, 0.45); transform: translateY(-2px); }
        .layout-btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        
        .news-container { position: relative; }
        
        #news-grid { display: grid; gap: 20px; overflow-x: hidden; }
        
        /* Layout: Grid (Standard) */
        #news-grid.layout-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        
        /* Layout: Liste */
        #news-grid.layout-list { grid-template-columns: 1fr; }
        #news-grid.layout-list .news-card { display: flex; flex-direction: row; }
        #news-grid.layout-list .news-card img { width: 200px; height: 140px; flex-shrink: 0; }
        
        /* Layout: Kompakt */
        #news-grid.layout-compact { grid-template-columns: 1fr; }
        #news-grid.layout-compact .news-card { display: flex; flex-direction: row; align-items: center; padding: 8px; }
        #news-grid.layout-compact .news-card img { width: 60px; height: 60px; border-radius: 4px; }
        #news-grid.layout-compact .news-card-content { padding: 0 0 0 10px; }
        #news-grid.layout-compact .news-card h3 { font-size: 0.9rem; margin-bottom: 2px; }
        #news-grid.layout-compact .news-card p { display: none; }
        #news-grid.layout-compact .news-card .meta { margin-bottom: 0; }
        
        /* Layout: Magazin */
        #news-grid.layout-magazine { grid-template-columns: repeat(12, 1fr); }
        #news-grid.layout-magazine .news-card { grid-column: span 3; }
        #news-grid.layout-magazine .news-card:first-child { grid-column: span 8; grid-row: span 2; }
        #news-grid.layout-magazine .news-card:first-child img { height: 300px; }
        #news-grid.layout-magazine .news-card:first-child h3 { font-size: 1.4rem; }
        @media (max-width: 1000px) {
            #news-grid.layout-magazine .news-card { grid-column: span 6; }
            #news-grid.layout-magazine .news-card:first-child { grid-column: span 12; }
        }
        @media (max-width: 600px) {
            #news-grid.layout-magazine .news-card { grid-column: span 12; }
        }
        
        /* ===== MOBILE OPTIMIERUNG ===== */
        
        /* Shorts-Modus (Portrait) - TikTok/YouTube Shorts Style */
        .layout-shorts {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            background: #000 !important;
            z-index: 9998 !important;
            overflow: hidden !important;
        }
        
        .layout-shorts .news-card {
            position: absolute !important;
            width: 100% !important;
            height: 100% !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
            transform: none !important;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .layout-shorts .news-card.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .layout-shorts .news-card.swipe-up {
            transform: translateY(-100%);
            opacity: 0;
        }
        
        .layout-shorts .news-card.swipe-down {
            transform: translateY(100%);
            opacity: 0;
        }
        
        .layout-shorts .news-card img {
            width: 100% !important;
            height: 100% !important;
            max-height: 65vh !important;
            object-fit: cover !important;
        }
        
        .layout-shorts .news-card-content {
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            background: linear-gradient(transparent, rgba(0,0,0,0.9)) !important;
            padding: 60px 20px 40px !important;
            max-height: 40vh !important;
            overflow-y: auto !important;
        }
        
        .layout-shorts .news-card h3 {
            font-size: 1.3rem !important;
            color: #fff !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5) !important;
        }
        
        .layout-shorts .news-card p {
            color: rgba(255,255,255,0.85) !important;
            -webkit-line-clamp: 4 !important;
        }
        
        .layout-shorts .news-card .meta {
            color: rgba(255,255,255,0.7) !important;
        }
        
        .layout-shorts .news-card .meta a {
            color: #c084fc !important;
        }
        
        /* Shorts Navigation Controls */
        .shorts-nav {
            position: fixed !important;
            right: 12px !important;
            bottom: 30% !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 20px !important;
            z-index: 9999 !important;
        }
        
        .shorts-nav-btn {
            width: 48px !important;
            height: 48px !important;
            border-radius: 50% !important;
            background: rgba(255,255,255,0.15) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: #fff !important;
            font-size: 1.4rem !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            -webkit-tap-highlight-color: transparent !important;
        }
        
        .shorts-nav-btn:active {
            background: rgba(157,92,224,0.6) !important;
            transform: scale(0.95) !important;
        }
        
        .shorts-nav-counter {
            position: fixed !important;
            top: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            background: rgba(0,0,0,0.6) !important;
            backdrop-filter: blur(10px) !important;
            padding: 8px 16px !important;
            border-radius: 20px !important;
            color: #fff !important;
            font-size: 0.85rem !important;
            z-index: 9999 !important;
        }
        
        /* Close Button for Shorts */
        .shorts-close {
            position: fixed !important;
            top: 20px !important;
            right: 20px !important;
            width: 40px !important;
            height: 40px !important;
            border-radius: 50% !important;
            background: rgba(0,0,0,0.6) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: #fff !important;
            font-size: 1.2rem !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            z-index: 9999 !important;
        }
        
        /* Full-Width Landscape Modus */
        @media (orientation: landscape) and (max-height: 600px) {
            .main {
                padding: 10px !important;
                max-width: 100vw !important;
            }
            
            .header {
                padding: 6px 10px !important;
            }
            
            .logo-text {
                font-size: 1.1rem !important;
            }
            
            .logo {
                height: 28px !important;
            }
            
            .toolbar {
                margin-top: 6px !important;
                gap: 6px !important;
            }
            
            .toolbar button, .toolbar select {
                padding: 6px 10px !important;
                font-size: 0.8rem !important;
            }
            
            #news-grid {
                gap: 12px !important;
            }
            
            .news-card {
                border-radius: 10px !important;
            }
            
            .news-card img {
                height: 100px !important;
            }
            
            .news-card-content {
                padding: 10px 12px !important;
            }
            
            .news-card h3 {
                font-size: 0.9rem !important;
                margin-bottom: 4px !important;
            }
            
            .news-card p {
                -webkit-line-clamp: 2 !important;
                font-size: 0.8rem !important;
            }
            
            .news-card .meta {
                font-size: 0.7rem !important;
                margin-bottom: 4px !important;
            }
        }
        
        /* Mobile Touch Optimizations */
        @media (pointer: coarse) {
            .news-card {
                -webkit-tap-highlight-color: transparent !important;
            }
            
            button, .tab, .layout-btn {
                min-height: 44px !important;
                min-width: 44px !important;
            }
            
            input, select {
                font-size: 16px !important;
            }
            
            #news-sidebar {
                width: 280px !important;
            }
            
            .info-bar, #info-bar {
                font-size: 0.7rem !important;
                padding: 6px 12px !important;
            }
        }
        
        /* Tablet Optimierung */
        @media (min-width: 768px) and (max-width: 1024px) {
            #news-grid.layout-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
            }
        }
        
        /* Very small screens */
        @media (max-width: 380px) {
            #news-grid.layout-grid {
                grid-template-columns: 1fr !important;
            }
            
            .header-content {
                padding: 0 5px !important;
            }
            
            .toolbar {
                gap: 4px !important;
            }
            
            .layout-btn-group {
                gap: 4px !important;
            }
        }
        
        /* Modern News Cards */
        .news-card { background: linear-gradient(135deg, rgba(45, 38, 64, 0.95), rgba(26, 22, 37, 0.95)); border-radius: 20px; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(157, 92, 224, 0.1); transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(157, 92, 224, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .news-card:hover { transform: translateY(-8px); box-shadow: 0 16px 56px rgba(157, 92, 224, 0.25), 0 0 0 1px rgba(157, 92, 224, 0.4); }
        .news-card img { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(135deg, rgba(157, 92, 224, 0.2), rgba(124, 58, 237, 0.1)); display: block; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .news-card:hover img { transform: scale(1.08); }
        .news-card-content { padding: 18px 20px; }
        .news-card h3 { font-size: 1.05rem; margin-bottom: 10px; line-height: 1.4; font-weight: 600; transition: color 0.2s ease; }
        .news-card h3 a { color: var(--text); text-decoration: none; transition: color 0.2s ease; }
        .news-card h3 a:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
        .news-card .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .feed-preview {
            cursor: pointer;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        
        .feed-preview:hover {
            background: rgba(157, 92, 224, 0.15);
            color: var(--accent);
        }
        
        .feed-preview::after {
            content: attr(data-feed-name) '\A' attr(data-feed-url);
            white-space: pre;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: linear-gradient(135deg, #2d2640 0%, #1a1625 100%);
            border: 1px solid rgba(157, 92, 224, 0.3);
            color: #e8e4f0;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.75rem;

            min-width: 180px;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .feed-preview:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }
        .news-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .news-card.unread { border-left: 4px solid var(--accent); box-shadow: 0 0 25px rgba(157, 92, 224, 0.25), inset 0 0 30px rgba(147, 51, 234, 0.08); }
        
        .new-badge {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: linear-gradient(135deg, #9d5ce0 0%, #c084fc 100%);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(157, 92, 224, 0.5);

            letter-spacing: 0.5px;
            z-index: 10;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 15px rgba(157, 92, 224, 0.5); }
            50% { box-shadow: 0 4px 20px rgba(192, 132, 252, 0.7); }
        }
        
        .news-card .thumb { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .news-card { position: relative; }
        
        .loading { text-align: center; padding: 50px; color: var(--muted); font-size: 1rem; }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        #loading-indicator {
            display: none;
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: rgba(26, 22, 37, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #3d3654;
            border-radius: 10px;
            padding: 12px 14px;
            z-index: 9999;
            flex-direction: column;
            gap: 8px;
            min-width: 140px;
            box-shadow: 0 8px 32px rgba(157, 92, 224, 0.3);
        }
        
        .loader-container {
            position: relative;
            width: 32px;
            height: 32px;
            margin: 0 auto;
        }
        
        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
        }
        
        .loader-ring-1 {
            border-top-color: #9d5ce0;
            border-right-color: #9d5ce0;
            animation: spin-1 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        
        .loader-ring-2 {
            width: 24px;
            height: 24px;
            top: 4px;
            left: 4px;
            border-bottom-color: #c084fc;
            border-left-color: #c084fc;
            animation: spin-2 1s linear infinite reverse;
        }
        
        .loader-ring-3 {
            width: 16px;
            height: 16px;
            top: 8px;
            left: 8px;
            border-top-color: #e9d5ff;
            animation: spin-1 0.8s linear infinite;
        }
        
        .loader-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            background: radial-gradient(circle, #c084fc 0%, #9d5ce0 100%);
            border-radius: 50%;
            box-shadow: 0 0 6px #9d5ce0;
        }
        
        @keyframes spin-1 {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes spin-2 {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }
        
        .loader-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: #e8e4f0;
            letter-spacing: 0.05em;
            text-align: center;
        }
        
        .loader-subtext {
            font-size: 0.6rem;
            color: #8b7fa3;
            text-align: center;
        }
        
        .loader-progress {
            width: 100%;
            height: 4px;
            background: #3d3654;
            border-radius: 2px;
            overflow: hidden;

        }
        
        .loader-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #9d5ce0, #c084fc);

        .tab.loading { opacity: 0.7; pointer-events: none; }

        .settings-panel h3 { font-size: 0.95rem; margin-bottom: 10px; }
        .settings-row { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }

</head>

    <script>
        'use strict';
        
        // ========== PROXY MANAGER ==========
        const proxyManager = {
            proxies: [
                // rss2json - zuverlässigster, mit count=100 für mehr Items
                { url: 'https://api.rss2json.com/v1/api.json?rss_url=', type: 'rss2json', fails: 0, success: 0, count: 100 },
                // corsproxy.io - neuer kostenloser Proxy
                { url: 'https://corsproxy.io/?', type: 'corsproxy', fails: 0, success: 0 },
                // allorigins Varianten
                { url: 'https://api.allorigins.win/raw?url=', type: 'allorigins-raw', fails: 0, success: 0 },
                { url: 'https://api.allorigins.win/get?url=', type: 'allorigins', fails: 0, success: 0 },
                // Fallbacks
                { url: 'https://rss.jesgoo.com/fetch?url=', type: 'jesgoo', fails: 0, success: 0 },
            ],
            
            getActiveProxies() {
                return this.proxies.filter(p => p.fails < 5);
            },
            
            markFail(type) {
                const p = this.proxies.find(proxy => proxy.type === type);
                if (p) {
                    p.fails++;
                    console.log('[ProxyManager] ' + type + ' fail ' + p.fails + '/3');
                }
            },
            
            markSuccess(type) {
                const p = this.proxies.find(proxy => proxy.type === type);
                if (p) {
                    p.success++;
                    if (p.fails > 0) p.fails = Math.max(0, p.fails - 1);
                }
            },
            
            reset() {
                this.proxies.forEach(p => {
                    p.fails = 0;
                });
            }
        };

        // Direkter Fetch - versucht ohne Proxy, fallback auf Proxy bei CORS
        function getHostname(url) {
            try { return new URL(url).hostname; } catch(e) { return url.slice(0, 30); }
        }
        
        async function fetchDirectFirst(url) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.FEED_TIMEOUT);
                
                const res = await fetch(url, {
                    headers: { 'Accept': 'application/rss+xml, application/xml, text/xml, */*' },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (res.ok) {
                    const text = await res.text();
                    if (text.length > 50 && (text.includes('<') || text.includes('<?'))) {
                        debugLog('[Direct] ' + getHostname(url) + ' - OK (no proxy)');
                        return { ok: true, text: async () => text };
                    }
                }
                // Wenn nicht OK, weiter zum Proxy
            } catch (e) {
                // CORS oder Netzwerkfehler - Proxy verwenden
                const isCors = e.name === 'AbortError' || 
                               e.message.includes('Failed to fetch') || 
                               e.message.includes('NetworkError') ||
                               e.message.includes('CORS');
                if (isCors) {
                    debugLog('[Direct] ' + getHostname(url) + ' - CORS/Netzwerk, verwende Proxy');
                } else {
                    console.log('[Direct] ' + getHostname(url) + ' - Fehler: ' + e.message);
                }
            }
            
            // Fallback auf Proxy
            return fetchWithProxy(url);
        }
        
        async function fetchWithProxy(url, retryCount = 0) {
            const proxies = proxyManager.getActiveProxies();
            const maxRetries = 1;
            
            if (proxies.length === 0) {
                throw new Error('Keine aktiven Proxies verfügbar');
            }
            
            let lastError = null;
            
            for (const proxy of proxies) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), CONFIG.PROXY_TIMEOUT);
                    
                    let encodedUrl;
                    try {
                        encodedUrl = encodeURIComponent(url);
                    } catch (e) {
                        encodedUrl = encodeURIComponent(url.replace(/[^\x00-\x7F]/g, ''));
                    }
                    
                    // Füge count Parameter für rss2json hinzu um mehr Items zu laden
                    let fullUrl = proxy.url + encodedUrl;
                    if (proxy.count) {
                        fullUrl += '&count=' + proxy.count;
                        debugLog('[Proxy] ' + proxy.type + ' - count=' + proxy.count);
                    }
                    const res = await fetch(fullUrl, { 
                        headers: { 'Accept': 'application/rss+xml, application/xml, text/xml, */*' },
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    
                    if (res.status === 429 || res.status === 503) {
                        if (retryCount < maxRetries) {
                            debugLog('[Proxy] ' + proxy.type + ' rate limited, Retry ' + (retryCount + 1) + '...');
                            await new Promise(r => setTimeout(r, 2000));
                            return fetchWithProxy(url, retryCount + 1);
                        }
                        proxyManager.markFail(proxy.type);
                        continue;
                    }
                    
                    if (res.status >= 500) {
                        proxyManager.markFail(proxy.type);
                        continue;
                    }
                    
                    if (res.ok) {
                        proxyManager.markSuccess(proxy.type);
                        
                        if (proxy.type.startsWith('rss2json') || proxy.type === 'rssapi' || proxy.type === 'ryte') {
                            try {
                                const json = await res.json();
                                if (json.status === 'ok' && json.items && json.items.length > 0) {
                                    const xml = `<?xml version="1.0"?><rss><channel>${json.items.map(i => {
                                        const imgUrl = i.thumbnail || i.enclosure?.link || i.image?.url || i.image || '';
                                        const content = i.description || i.content || '';
                                        return `<item><title>${escapeXml(i.title)}</title><link>${escapeXml(i.link)}</link><description>${escapeXml(content)}</description><pubDate>${escapeXml(i.pubDate || i.date || '')}</pubDate><enclosure url="${escapeXml(imgUrl)}" type="image"/><content:encoded><![CDATA[${content}]]></content:encoded></item>`;
                                    }).join('')}</channel></rss>`;
                                    return { ok: true, text: async () => xml };
                                }
                            } catch (jsonErr) {
                                debugLog('[Proxy] ' + proxy.type + ' JSON Parse fehlgeschlagen');
                            }
                        } else if (proxy.type === 'allorigins') {
                            const json = await res.json();
                            if (json.contents) return { ok: true, text: () => Promise.resolve(json.contents) };
                        } else {
                            const text = await res.text();
                            // Prüfe auf HTML-Fehlerstatt XML
                            if (text.includes('<!DOCTYPE html') || text.includes('<html') || text.includes('<head>') || text.includes('<body')) {
                                debugLog('[Proxy] ' + proxy.type + ' gibt HTML zurück, überspringe');
                                proxyManager.markFail(proxy.type);
                                continue;
                            }
                            if (text.length > 50 && (text.includes('<') || text.includes('<?'))) {
                                return { ok: true, text: async () => text };
                            }
                        }
                    }
                } catch (e) { 
                    lastError = e;
                    if (e.name === 'AbortError' || e.message.includes('abort')) {
                        proxyManager.markFail(proxy.type);
                    }
                    debugLog('[Proxy] ' + proxy.type + ' fehlgeschlagen: ' + e.message);
                }
            }
            
            throw new Error(lastError?.message || 'Alle Proxies fehlgeschlagen');
        }
        
        let feeds = [];
        let feedGroups = [];
        let newsCache = {};
        let intervalId = null;
        let countdownId = null;
        let nextRefreshTime = 0;
        let greetingInterval = null;
        let currentLayout = 'grid';
        let showImages = true;
        let sortOrder = 'date';
        let feedStatus = {};
        let activeFeedFilter = null;
        let activeGroupFilter = null;
        let readStatus = {};
        let currentNews = [];
        let hasInitialLoad = false;
        let isBackgroundRefreshing = false;
        let isLoadingPromise = null;
        
        // Infinite Scroll
        let displayedNewsCount = 0;
        let infiniteScrollLoading = false;
        let allNewsLoaded = false;
        
        // Event Listener Tracking für sauberes Aufräumen
        const boundEventListeners = [];
        
        function addBoundedListener(element, event, handler, options) {
            const boundHandler = handler.bind();
            element.addEventListener(event, boundHandler, options);
            boundEventListeners.push({ element, event, handler: boundHandler, options });
            return boundHandler;
        }
        
        function removeAllEventListeners() {
            boundEventListeners.forEach(entry => {

        // ========== WEB WORKER FÜR XML-PARSING ==========
        let parserWorker = null;
        let parserWorkerAvailable = false; // Worker deaktiviert - DOMParser nicht verfügbar in Worker
        let parserWorkerRequestId = 0;
        let parserWorkerBlobUrl = null;
        const parserWorkerPending = new Map();
        
        function cleanupParserWorker() {
            if (parserWorker) {
                parserWorker.terminate();
                parserWorker = null;
            }
            if (parserWorkerBlobUrl) {
                URL.revokeObjectURL(parserWorkerBlobUrl);
                parserWorkerBlobUrl = null;
            }
            parserWorkerAvailable = false;
            parserWorkerPending.clear();
        }
        
        function setupParserWorker() {
            try {
                const workerCode = `
                    self.onmessage = function(e) {
                        const { id, rawText, config } = e.data;
                        const DAYS_BACK = config.DAYS_BACK || 30;
                        const thirtyDaysAgo = Date.now() - (DAYS_BACK * 24 * 60 * 60 * 1000);
                        
                        try {
                            const parser = new DOMParser();
                            const xml = parser.parseFromString(rawText, 'text/xml');
                            
                            const parseError = xml.querySelector('parsererror');
                            if (parseError) {
                                self.postMessage({ id, error: 'XML Parse Error' });
                                return;
                            }
                            
                            const items = Array.from(xml.querySelectorAll('item, entry')).map(item => {
                                const enclosure = item.querySelector('enclosure[type^="image"]');
                                const thumbnail = item.querySelector('thumbnail, media\\:thumbnail');
                                const mediaContent = item.querySelector('media\\:content, media\\:content');
                                
                                let img = enclosure?.getAttribute('url') || thumbnail?.getAttribute('url') || mediaContent?.getAttribute('url') || '';
                                
                                if (!img) {
                                    const ogImage = item.querySelector('meta[property="og:image"]');
                                    if (ogImage) img = ogImage.getAttribute('content');
                                }
                                
                                if (!img) {
                                    const twitterImage = item.querySelector('meta[name="twitter:image"]');
                                    if (twitterImage) img = twitterImage.getAttribute('content');
                                }
                                
                                if (!img) {
                                    const content = item.querySelector('content\\:encoded, content')?.textContent || '';
                                    const imgMatch = content.match(/<img[^>]+src=["']([^"']+)["']/);
                                    if (imgMatch) img = imgMatch[1];
                                }
                                
                                const title = item.querySelector('title')?.textContent || '';
                                const link = item.querySelector('link')?.textContent || item.querySelector('link')?.getAttribute('href') || '';
                                const date = item.querySelector('pubDate, published, updated')?.textContent || '';
                                const desc = item.querySelector('description, summary, content')?.textContent || '';
                                
                                return { title, link, date, desc, img };
                            }).filter(i => {
                                if (!i.title) return false;
                                const itemDate = new Date(i.date).getTime();
                                return !isNaN(itemDate) && itemDate > thirtyDaysAgo;
                            });
                            
                            self.postMessage({ id, items });
                        } catch (err) {
                            self.postMessage({ id, error: err.message });
                        }
                    };
                `;
                
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                parserWorkerBlobUrl = URL.createObjectURL(blob);
                parserWorker = new Worker(parserWorkerBlobUrl);
                
                parserWorker.onmessage = (e) => {
                    const { id, items, error } = e.data;
                    const pending = parserWorkerPending.get(id);
                    if (pending) {
                        if (error) {
                            pending.reject(new Error(error));
                        } else {
                            pending.resolve(items);
                        }
                        parserWorkerPending.delete(id);
                    }
                };
                
                parserWorker.onerror = (e) => {
                    console.warn('[Worker] Parser-Worker Fehler:', e.message);
                    parserWorkerAvailable = false;
                };
                
                parserWorkerAvailable = true;
                console.log('[Worker] Parser-Worker initialisiert');
            } catch (e) {
                console.warn('[Worker] Worker nicht verfügbar:', e.message);
                parserWorkerAvailable = false;
            }
        }
        
        function parseFeedInWorker(feed, rawText) {
            return new Promise((resolve, reject) => {
                if (!parserWorkerAvailable || !parserWorker) {
                    reject(new Error('Worker nicht verfügbar'));
                    return;
                }
                
                const id = ++parserWorkerRequestId;
                parserWorkerPending.set(id, { resolve, reject });
                
                parserWorker.postMessage({
                    id,
                    rawText,
                    config: { DAYS_BACK: CONFIG.DAYS_BACK }
                });
                
                // Timeout für Worker
                setTimeout(() => {
                    if (parserWorkerPending.has(id)) {
                        parserWorkerPending.delete(id);
                        reject(new Error('Worker Timeout'));
                    }
                }, 10000);
            });
        }

        function loadFeedLatency() {

                if (stored) feedLatency = JSON.parse(stored);

        function saveFeedLatency() {

        }
        
        function recordFeedLatency(url, durationMs) {
            if (!url || durationMs <= 0) return;
            const existing = feedLatency[url];
            if (existing) {
                feedLatency[url] = Math.round((existing * 0.7) + (durationMs * 0.3));
            } else {
                feedLatency[url] = Math.round(durationMs);
            }
            saveFeedLatency();
        }
        
        function sortFeedsByLatency(feeds) {
            return [...feeds].sort((a, b) => {
                const latA = feedLatency[a.url] || 999999;
                const latB = feedLatency[b.url] || 999999;
                return latA - latB;
            });
        }
        
        function pruneCache() {
            const entries = Object.entries(newsCache);
            if (entries.length > MAX_CACHE_SIZE) {
                entries.sort((a, b) => b[1].time - a[1].time);
                const toDelete = entries.slice(MAX_CACHE_SIZE);
                toDelete.forEach(([key]) => delete newsCache[key]);
                console.log('[Cache] Optimiert: ' + toDelete.length + ' Einträge entfernt');
            }

        function pruneReadStatus() {
            const currentLinks = new Set(currentNews.map(n => n.link));
            let removed = 0;
            for (const link in readStatus) {
                if (!currentLinks.has(link)) {
                    delete readStatus[link];
                    removed++;
                }
            }
            if (removed > 0) {
                safeSetItem('rss_read', readStatus);
                console.log('[readStatus] Bereinigt: ' + removed + ' alte Einträge entfernt');
            }
        }
        
        // Safe localStorage helper
        function safeGetItem(key, defaultValue = null) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultValue;
            } catch (e) {
                console.warn('localStorage error:', key, e);
                return defaultValue;
            }
        }
        
        // Robust readStatus loader - validiert das Format
        function loadReadStatus() {
            const raw = safeGetItem('rss_read', {});
            
            // Prüfe ob es ein Object ist
            if (typeof raw !== 'object' || raw === null || Array.isArray(raw)) {
                console.warn('[readStatus] Ungültiges Format, wird zurückgesetzt');
                return {};
            }
            
            // Validiere jeden Eintrag: nur Strings als Keys, nur boolesche Werte
            const validated = {};
            for (const [key, value] of Object.entries(raw)) {
                if (typeof key === 'string' && (value === true || value === false)) {
                    validated[key] = value;
                }
            }
            
            const invalidCount = Object.keys(raw).length - Object.keys(validated).length;
            if (invalidCount > 0) {
                console.warn('[readStatus] ' + invalidCount + ' ungültige Einträge entfernt');
            }
            
            return validated;
        }
        
        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                console.warn('localStorage save error:', key, e);
            }
        }
        
        function safeJsonParse(str, fallback = null) {
            try {
                return JSON.parse(str);
            } catch (e) {
                console.warn('JSON parse error:', e.message);
                return fallback;
            }
        }
        
        // Security: XSS Prevention
        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function escapeXml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }

        function handleShortsTouchStart(e) {

        function handleShortsTouchEnd(e) {
            if (!isShortsMode) return;
            shortsTouchEndY = e.changedTouches[0].clientY;
            
            const diff = shortsTouchStartY - shortsTouchEndY;
            const minSwipe = 50;
            
            if (Math.abs(diff) > minSwipe) {
                if (diff > 0) {
                    shortsNext();
                } else {
                    shortsPrevious();
                }
            }

            updateShortsCounter();
